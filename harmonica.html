<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Harmonica</title>
</head>
<body>
    <!-- use vue.global.prod.js to get rid of DEBUG info and stuff! -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <div id="app"> 
        <div class="d-flex flex-align-items-center">
            <div class="container grid-lg">
            <div class="columns">
                <div class="column col-12">
                    <ul class="tab tab-block">
                        <li class="tab-item">
                            <a href="./index.html">Ocarina</a>
                        </li>
                        <li class="tab-item active">
                            <a href="./harmonica.html">Harmonica</a>
                        </li>
                    </ul>
                    <br />
                    <br />
                    <h1 class="text-primary">{{title_blow}} / {{title_draw}}</h1>
                    <h2 class="text-secondary">Blow / Draw</h2>
                    <h3 class="text-secondary">{{slide}}</h3>
                    <img class="img-responsive" :src="url">
                    <button :id="'hr-'+note" class="btn btn-primary btn" v-for="note in notes_black" v-on:click="setNote({name: note, type: 'black'})">{{note}}</button>
                    <br />
                    <button class="btn btn-lg" v-for="note in notes_white" v-on:click="setNote({name: note, type: 'white'})">{{note}}</button>
                    <br />
                    <br />
                    <h3 class="text-primary">Scale Table</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Blow</th>
                                <th>Draw</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            <td>1</td>
                            <td>C1</td>
                            <td>D1</td>
                            </tr>
                            <tr>
                            <td>2</td>
                            <td>E1 / F1 Slide in</td>
                            <td></td>
                            </tr>
                            <tr>
                            <td>3</td>
                            <td>G1</td>
                            <td>A1</td>
                            </tr>
                            <tr>
                            <td>4</td>
                            <td></td>
                            <td>B1</td>
                            </tr>
                            <tr>
                            <td>5</td>
                            <td>C2</td>
                            <td>D2</td>
                            </tr>
                            <tr>
                            <td>6</td>
                            <td>E2 / F2 Slide in</td>
                            <td></td>
                            </tr>
                            <tr>
                            <td>7</td>
                            <td>G2</td>
                            <td>A2</td>
                            </tr>
                            <tr>
                            <td>8</td>
                            <td></td>
                            <td>B2</td>
                            </tr>
                            <tr>
                            <td>9</td>
                            <td>C3</td>
                            <td>D3</td>
                            </tr>
                            <tr>
                            <td>10</td>
                            <td>E3 / F3 Slide in</td>
                            <td></td>
                            </tr>
                        </tbody>
                    </table>
                    <br />
                    <br />
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    title_blow: "C1",
                    title_draw: "D1",
                    slide: "Slide Out",
                    url: "harmonica-assets/00_C1.png",
                    notes_slide_out: [
                        {blow: "C1", draw: "D1", img: "00_C1.png"},
                        {blow: "E1", draw: "F1", img: "01_E1.png"},
                        {blow: "G1", draw: "A1", img: "02_G1.png"},
                        {blow: "C2", draw: "B1", img: "03_C2.png"},
                        {blow: "C2", draw: "D2", img: "04_C2.png"},
                        {blow: "E2", draw: "F2", img: "05_E2.png"},
                        {blow: "G2", draw: "A2", img: "06_G2.png"},
                        {blow: "C3", draw: "B2", img: "07_C3.png"},
                        {blow: "C3", draw: "D3", img: "08_C3.png"},
                        {blow: "E3", draw: "F3", img: "09_E3.png"},
                    ],

                    notes_slide_in: [
                        {blow: "C#1", draw: "D#1", img: "00_C1.png"},
                        {blow: "F1",  draw: "F#1", img: "01_E1.png"},
                        {blow: "G#1", draw: "A#1", img: "02_G1.png"},
                        {blow: "C#2", draw: "C2",  img: "03_C2.png"},
                        {blow: "C#2", draw: "D#2", img: "04_C2.png"},
                        {blow: "F2",  draw: "F#2", img: "05_E2.png"},
                        {blow: "G#2", draw: "A#2", img: "06_G2.png"},
                        {blow: "C#3", draw: "C3",  img: "07_C3.png"},
                        {blow: "C#3", draw: "D#3", img: "08_C3.png"},
                        {blow: "F3",  draw: "F#3", img: "09_E3.png"},
                    ],
                    notes_white: ["C1","D1","E1","F1","G1","A1","B1","C2","D2","E2","F2","G2","A2","B2","C3","D3","E3","F3"],
                    notes_black: ["C#1","D#1","F1","F#1","G#1","A#1","C2","C#2","D#2","F2","F#2","G#2","A#2","C3","C#3","D#3","F3","F#3"]
                }
            },
            methods: {
                setNote(note) {
                    if (note.type == "white") {
                        for (const nso of this.notes_slide_out) {
                            if(nso.draw == note.name || nso.blow == note.name) {
                                this.url = "harmonica-assets/" + nso.img
                                this.title_blow = nso.blow
                                this.title_draw = nso.draw
                                this.slide = "Slide Out"
                            }
                        }
                    }
                    else {
                        for (const nsi of this.notes_slide_in) {
                            if(nsi.draw == note.name || nsi.blow == note.name) {
                                this.url = "harmonica-assets/" + nsi.img
                                this.title_blow = nsi.blow
                                this.title_draw = nsi.draw
                                this.slide = "Slide In"
                            }
                        }
                    }

                    
                }
            }
          
        })

    app.mount('#app')

    </script>
</body>
</html>
